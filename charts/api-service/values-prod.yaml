replicaCount: 3

image:
  repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/api-service
  tag: "1.4.2"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65

ingress:
  hosts:
    - host: api.production.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-prod-tls
      hosts:
        - api.production.example.com

env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "warn"
  - name: DB_POOL_SIZE
    value: "20"
